        .btn-pro { background: linear-gradient(135deg, #bc13fe 0%, #7a0bc0 100%); color: white; }

<body class="p-4">

                <button onclick="setMode('premium')" id="tab-p" class="flex-1 py-3 rounded-xl text-xs font-bold text-zinc-500">PREMIUM (500 F)</button>
            </div>

            <input type="text" id="name" placeholder="Nom et Prénoms" class="w-full p-4 bg-zinc-50 border rounded-2xl outline-none focus:border-[#bc13fe]">
            <input type="text" id="job" placeholder="Poste ou Classe (ex: 1ère A2)" class="w-full p-4 bg-zinc-50 border rounded-2xl">
            <input type="file" id="photo" accept="image/*" class="text-xs text-zinc-500">
            <input type="text" id="contact" placeholder="Ton WhatsApp (ex: 07...)" class="w-full p-4 bg-zinc-50 border rounded-2xl">
            <textarea id="desc" placeholder="Ton parcours..." class="w-full p-4 bg-zinc-50 border rounded-2xl h-24"></textarea>

            <div id="status-box" class="p-4 bg-purple-50 rounded-2xl border border-purple-100 text-center">
                <p id="status-text" class="text-[11px] text-purple-700 font-bold mb-3 uppercase">Action : Partage requis</p>
                <button onclick="handleAction()" id="action-btn" class="w-full py-3 bg-[#25D366] text-white font-bold rounded-xl text-sm shadow-md">Lancer le Partage</button>
            </div>

            <button id="dl-btn" disabled onclick="generateFinal()" class="w-full py-5 bg-zinc-200 text-zinc-400 font-black rounded-2xl uppercase text-sm">Télécharger mon CV</button>
        </div>
    </div>

    <div id="cv-render">

                <div>
                    <h1 id="out-name" style="font-size: 32px; font-weight: bold; margin: 0; text-transform: uppercase;"></h1>
                    <p id="out-job" style="font-size: 20px; color: #bc13fe; margin: 5px 0; font-weight: bold;"></p>
                    <p id="vip-tag" style="display:none; color: #D4AF37; font-weight: bold;">★ CANDIDAT PREMIUM CERTIFIÉ</p>
